{% extends "base.html" %}
{% block title %}{{ story.title }}{% endblock %}
{% block nav_title %}{{ story.title }}{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/bookshelf.css') }}">
<style>
.sb-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: calc(100vh - 80px);
  background: rgba(255,255,255,0.9);
  padding: 16px;
  box-sizing: border-box;
}

/* 왼쪽 배경/그림 페이지 */
.sb-left-page {
  position: absolute;
  left: 0;
  width: 50%;
  height: 100%;
  border-radius: 10px 0 0 10px;
  overflow: hidden;
}

/* 장면 배경 */
.scene-sky {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.scene-bg-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.4s ease;
  z-index: 1;
  pointer-events: none;
}
.scene-vignette {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.22) 100%);
}

/* 그림 스테이지 */
@keyframes float-anim {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-10px); }
}
/* ── 그림 스테이지: 아이 그림이 메인 ──────────────────────── */
.drawing-stage {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 10;
  gap: 0;
}
/* 주 그림: 화면 중앙 하단, 크게 */
.drawing-stage.ground, .drawing-stage.cover-ground {
  bottom: 0; left: 0; right: 0;
  padding-bottom: 10px;
}
/* 보조 그림: 우측 하단, 작게 (단독 보조일 때) */
.drawing-stage.ground-sub {
  bottom: 0; right: 3%;
  width: 34%;
  z-index: 9;
  padding-bottom: 8px;
}
/* 두 지상 그림 나란히 배치 (합계 98% → 2% 여백) */
.drawing-stage.ground-pair-l {
  bottom: 0; left: 0; width: 52%;
  padding-bottom: 10px;
}
.drawing-stage.ground-pair-r {
  bottom: 0; right: 0; width: 46%;
  z-index: 9;
  padding-bottom: 10px;
}
/* 하늘 그림: 중앙 상단, 크게 (달·무지개 등) */
.drawing-stage.sky {
  top: 4%; left: 0; right: 0;
  animation: float-anim 3s ease-in-out infinite;
}
/* 두 번째 하늘 그림: 우상단 */
.drawing-stage.sky-right {
  top: 4%; right: 4%;
  width: 36%;
  animation: float-anim 3.6s ease-in-out infinite reverse;
}
/* 꿈꾸는 듯한 효과: 수중 장면에서 하늘 그림 등 (상상·소원) */
.drawing-stage.dream {
  top: 8%; left: 0; right: 0;
  animation: float-anim 4s ease-in-out infinite;
}
.drawing-stage.dream .drawing-img {
  opacity: 0.55;
  filter: drop-shadow(0 0 18px rgba(255,255,255,0.9))
          drop-shadow(0 0 8px rgba(150,200,255,0.7))
          blur(1.5px);
}
/* sky-right + dream: 우상단 위치 유지하면서 dream 시각 효과 적용 */
.drawing-stage.sky-right.dream {
  top: 4%; right: 4%; left: auto; width: 36%;
}
/* 그림 이미지 — vh 기반으로 화면 크기에 비례하게 */
.drawing-img {
  max-width: 88%;
  max-height: 44vh;   /* 기본 지상 그림: 페이지 높이(75vh)의 약 58% */
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.45));
  display: block;
}
.drawing-img.sky-img   { max-width: 80%; max-height: 30vh; }  /* 하늘 그림 */
.drawing-img.cover-img { max-height: 34vh; max-width: 76%; }  /* 표지 그림 */
.drawing-img.sub-img   { max-width: 96%; max-height: 32vh; }  /* 보조/쌍 그림 */
.drawing-emoji-fallback {
  font-size: 5.5rem;
  opacity: 0.75;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}
.drawing-shadow {
  width: 55%;
  height: 14px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.32) 0%, transparent 70%);
  margin-top: -6px;
  flex-shrink: 0;
}
.drawing-shadow.small { width: 40%; height: 10px; }

/* 표지 제목 오버레이 */
.cover-title-overlay {
  position: absolute;
  top: 10%; left: 50%;
  transform: translateX(-50%);
  z-index: 15;
  text-align: center;
  width: 90%;
}
.cover-title-text {
  display: inline-block;
  font-size: 1.9rem;
  font-weight: 900;
  color: rgba(255,255,255,0.97);
  text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  line-height: 1.3;
  word-break: keep-all;
  background: rgba(0,0,0,0.18);
  border-radius: 14px;
  padding: 8px 18px;
  backdrop-filter: blur(2px);
}

/* 데코 */
.deco.s1,.deco.s2,.deco.s3,.deco.s4,.deco.s5 {
  position:absolute;border-radius:50%;z-index:2;pointer-events:none;
  background:#fff;box-shadow:0 0 6px 2px rgba(255,255,255,0.8);
}
.deco.s1{width:5px;height:5px;top:8%;left:12%;}
.deco.s2{width:4px;height:4px;top:18%;right:18%;}
.deco.s3{width:3px;height:3px;top:32%;left:55%;}
.deco.s4{width:5px;height:5px;top:12%;left:70%;}
.deco.s5{width:3px;height:3px;top:40%;right:10%;}
.deco.moon-orb{
  position:absolute;z-index:2;pointer-events:none;
  width:48px;height:48px;border-radius:50%;
  top:8%;right:14%;
  background:radial-gradient(circle at 35% 35%,#fffde7,#ffd740 60%,#f5a623);
  box-shadow:0 0 18px 6px rgba(255,235,59,0.35);
}
.deco.c1,.deco.c2,.deco.c3{
  position:absolute;z-index:2;pointer-events:none;
  background:rgba(255,255,255,0.72);border-radius:50px;
}
.deco.c1{width:72px;height:26px;top:14%;left:6%;}
.deco.c2{width:54px;height:20px;top:26%;right:8%;}
.deco.c3{width:44px;height:16px;top:8%;right:28%;}
.deco.b1,.deco.b2,.deco.b3{
  position:absolute;z-index:2;pointer-events:none;
  border-radius:50%;border:2px solid rgba(255,255,255,0.55);
  background:rgba(255,255,255,0.12);
}
.deco.b1{width:16px;height:16px;bottom:38%;left:18%;}
.deco.b2{width:10px;height:10px;bottom:52%;right:22%;}
.deco.b3{width:8px;height:8px;bottom:44%;left:55%;}
.deco.wave-deco{
  position:absolute;z-index:2;pointer-events:none;
  bottom:28%;left:0;right:0;height:18px;
  background:linear-gradient(to right,transparent 0%,rgba(255,255,255,0.18) 20%,rgba(255,255,255,0.25) 50%,rgba(255,255,255,0.18) 80%,transparent 100%);
  border-radius:50%;
}
.deco.aurora-line{
  position:absolute;z-index:2;pointer-events:none;
  top:15%;left:0;right:0;height:40px;
  background:linear-gradient(to right,transparent 0%,rgba(0,255,180,0.2) 30%,rgba(0,200,255,0.25) 60%,transparent 100%);
  border-radius:50%;filter:blur(6px);
}
.deco.snow1,.deco.snow2,.deco.snow3{
  position:absolute;z-index:2;pointer-events:none;
  width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.8);
}
.deco.snow1{top:10%;left:20%;width:8px;height:8px;}
.deco.snow2{top:22%;right:25%;}
.deco.snow3{top:35%;left:60%;}
.deco.sp1,.deco.sp2,.deco.sp3,.deco.sp4{
  position:absolute;z-index:2;pointer-events:none;width:8px;height:8px;border-radius:50%;
}
.deco.sp1{top:10%;left:10%;background:#ffd700;box-shadow:0 0 8px 3px rgba(255,215,0,0.7);}
.deco.sp2{top:18%;right:12%;background:#ff69b4;box-shadow:0 0 8px 3px rgba(255,105,180,0.7);}
.deco.sp3{top:30%;left:50%;background:#00e5ff;box-shadow:0 0 8px 3px rgba(0,229,255,0.7);}
.deco.sp4{top:8%;right:35%;background:#b9f542;box-shadow:0 0 8px 3px rgba(185,245,66,0.7);}
.deco.fl1,.deco.fl2,.deco.fl3{
  position:absolute;z-index:2;pointer-events:none;font-size:1.4rem;line-height:1;
}
.deco.fl1::after{content:'🌸';position:absolute;bottom:1px;left:6%;}
.deco.fl2::after{content:'🌼';position:absolute;bottom:1px;right:10%;}
.deco.fl3::after{content:'🌺';position:absolute;bottom:1px;left:45%;}
.deco.fl1{bottom:29%;left:6%;width:24px;height:24px;}
.deco.fl2{bottom:29%;right:10%;width:24px;height:24px;}
.deco.fl3{bottom:29%;left:45%;width:24px;height:24px;}

/* 오른쪽 페이지 내용 */
.tts-row {
  display: flex; align-items: center; gap: 12px;
  background: #f5f5f5; border-radius: 14px; padding: 10px 18px;
  width: 100%; box-sizing: border-box;
}
.tts-play-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none;
  background: #ffe066; cursor: pointer; font-size: 1rem; flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12); transition: transform 0.15s;
}
.tts-play-btn:hover { transform: scale(1.1); }
.keywords-row { display: flex; flex-wrap: wrap; gap: 6px; }
.cover-hint { font-size: 0.82rem; color: #bbb; margin: 0; }
.book-main-title { font-size: 1.8rem; font-weight: 900; color: #222; margin: 0; line-height: 1.3; }
.keyword-tag {
  background: #f0f0f0; color: #666; padding: 4px 12px;
  border-radius: 20px; font-size: 0.85rem; font-weight: 600;
}
.moral-big-icon { font-size: 3.2rem; text-align: center; }
.moral-label-text { font-size: 0.8rem; font-weight: 800; color: #f59e0b; letter-spacing: 0.08em; text-align: center; }
.moral-body { font-size: 1.05rem; line-height: 1.85; color: #555; font-style: italic; text-align: center; word-break: keep-all; margin: 0; }
.end-big-icon { font-size: 3.2rem; text-align: center; }
.end-heading { font-size: 1.4rem; font-weight: 800; color: #333; margin: 0; text-align: center; }
.end-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.btn {
  display: block; text-align: center; padding: 12px 20px;
  border-radius: 12px; font-size: 1rem; font-weight: 700;
  text-decoration: none; cursor: pointer; border: none;
  font-family: inherit;
}
.btn-yellow { background: #ffe066; color: #333; }
.btn-blue   { background: #e0f0ff; color: #2563eb; }
.btn-white  { background: #f5f5f5; color: #e53e3e; }
</style>

{% if story.audio_path %}
<audio id="tts-audio" preload="auto"
       src="{{ url_for('static', filename=story.audio_path.replace('static/', '')) }}">
</audio>
{% endif %}

<div class="sb-wrapper" data-story-id="{{ story.id }}">
  <div class="opened-book-container">
    <div class="book-volume">

      <!-- 왼쪽: 배경 + 그림 -->
      <div class="sb-left-page" id="sb-left"></div>

      <!-- 오른쪽: 텍스트 -->
      <div class="book-pages">
        <a href="/library" class="close-button"
           style="text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">
          ←
        </a>
        <h2 class="story-title">{{ story.title }}</h2>
        <div class="story-page-content">
          <div id="sb-content-inner"></div>
        </div>
        <div class="paging-controls">
          <button class="page-btn disabled" id="prev-btn" disabled>◀ 이전</button>
          <span class="page-indicator">
            <span id="current-page">1</span> / <span id="total-pages">?</span>
          </span>
          <button class="page-btn" id="next-btn">다음 ▶</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script id="story-data" type="application/json">
{
  "title":       {{ story.title      | tojson }},
  "content":     {{ story.content    | tojson }},
  "moral":       {{ story.moral      | tojson }},
  "keywords":    {{ story.keywords   | tojson }},
  "scene_data":  {{ story.scene_data  | tojson }},
  "layout_data": {{ story.layout_data | tojson }},
  "drawings":    {{ drawings | tojson }}
}
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/storybook.js') }}"></script>
{% endblock %}
