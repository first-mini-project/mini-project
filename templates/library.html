{% extends "base.html" %} {% block title %}나만의 도서관{% endblock %} {% block
nav_title %}나만의 도서관 📚{% endblock %} {% block content %}
<!-- React Mount Point -->
<div id="bookshelf-root"></div>

<!-- Server Injected Data -->
<script>
  window.SERVER_DATA = {
    stories: {{ stories | tojson | safe }},
    user: {
      total_books: {{ total_books | default(0) }},
      badge: "{{ badge | default('🌱 새싹 작가') }}"
    }
  };
</script>
{% endblock %} {% block scripts %}
<!-- Custom Styles -->
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/bookshelf.css') }}"
/>

<!-- ES Modules Import Map for React & Framer Motion -->
<script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "framer-motion": "https://esm.sh/framer-motion@11.0.3?deps=react@18.3.1,react-dom@18.3.1"
    }
  }
</script>

<!-- Babel Standalone for in-browser JSX compilation -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Our React App (Compiled on the fly by Babel) -->
<script
  type="text/babel"
  data-type="module"
  src="{{ url_for('static', filename='js/bookshelf.jsx') }}"
></script>
{% endblock %}
